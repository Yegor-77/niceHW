<!DOCTYPE html><html lang="uk"><head>
    <meta charset="UTF-8">
    <title>Управління студентами</title>
    <style>body {
  color: #333;
  background: #f0f2f5;
  padding: 40px;
  font-family: Segoe UI, sans-serif;
}

.container {
  background: #fff;
  border-radius: 12px;
  max-width: 800px;
  margin: 0 auto;
  padding: 30px;
  box-shadow: 0 4px 15px #0000001a;
}

h2 {
  border-bottom: 2px solid #007bff;
  padding-bottom: 10px;
}

.form-group {
  gap: 10px;
  margin-bottom: 20px;
  display: flex;
}

input {
  border: 1px solid #ddd;
  border-radius: 6px;
  flex: 1;
  padding: 10px;
}

button {
  cursor: pointer;
  border: none;
  border-radius: 6px;
  padding: 10px 20px;
  font-weight: bold;
  transition: all .2s;
}

.btn-add {
  color: #fff;
  background: #007bff;
}

.btn-add:hover {
  background: #0056b3;
}

.btn-get {
  color: #fff;
  background: #28a745;
  width: 100%;
  margin-bottom: 20px;
}

table {
  border-collapse: collapse;
  width: 100%;
  margin-top: 10px;
}

th, td {
  text-align: left;
  border-bottom: 1px solid #eee;
  padding: 12px;
}

th {
  background: #f8f9fa;
}

.btn-upd {
  color: #212529;
  background: #ffc107;
  margin-right: 5px;
}

.btn-del {
  color: #fff;
  background: #dc3545;
}

button:active {
  transform: scale(.95);
}
</style>
  </head>
  <body>
    <div class="container">
      <h2>Додати студента</h2>
      <form id="student-form" class="form-group">
        <input type="text" id="name" placeholder="Ім'я студента" required="">
        <input type="number" id="age" placeholder="Вік" required="">
        <button type="submit" class="btn-add">Додати (POST)</button>
      </form>

      <button id="load-btn" class="btn-get">
        Отримати список студентів (GET)
      </button>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Ім'я</th>
            <th>Вік</th>
            <th>Дії</th>
          </tr>
        </thead>
        <tbody id="list"></tbody>
      </table>
    </div>

    <script src="/niceHW.31b563d9.js" type="module"></script>
  

</body></html>
