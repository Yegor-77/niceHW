<!DOCTYPE html><html lang="uk"><head>
    <meta charset="UTF-8">
    <title>Управління студентами</title>
    <link rel="stylesheet" href="/niceHW.2cdaf7bc.css">
  </head>
  <body>
    <div class="container">
      <h2>Додати студента</h2>
      <form id="student-form" class="form-group">
        <input type="text" id="name" placeholder="Ім'я студента" required="">
        <input type="number" id="age" placeholder="Вік" required="">
        <button type="submit" class="btn-add">Додати (POST)</button>
      </form>

      <button id="load-btn" class="btn-get">
        Отримати список студентів (GET)
      </button>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Ім'я</th>
            <th>Вік</th>
            <th>Дії</th>
          </tr>
        </thead>
        <tbody id="list"></tbody>
      </table>
    </div>

    <script src="/niceHW.31b563d9.js" type="module"></script>
  

</body></html>
